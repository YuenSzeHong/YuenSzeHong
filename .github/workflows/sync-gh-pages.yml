name: Sync README to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # Generates a temporary token using your GitHub App credentials
      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # This tells the app to grab access for the target repo as well
          repositories: "${{ github.repository_owner }}.github.io"

      - name: Push to Pages Repo
        env:
          ORIGINAL_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Clone the destination repo
          git clone https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/${{ github.repository_owner }}/${{ github.repository_owner }}.github.io.git dest_repo
          
          # 2. Clean out old files in destination (except .git AND .github folders)
          find dest_repo -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # 3. Mirror all contents exactly, excluding git and workflow files
          rsync -av --exclude='dest_repo' --exclude='.git' --exclude='.github' ./ dest_repo/
          
          # 4. Commit and push everything
          cd dest_repo
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            
            # Extract headline safely via Bash environment variable
            ORIGINAL_HEADLINE=$(echo "$ORIGINAL_COMMIT_MSG" | head -n 1)
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            
            # Construct message purely inside Bash
            COMMIT_MSG=$(cat <<EOF
            $ORIGINAL_HEADLINE [skip ci]

            Automated sync from profile repository.
            Commit: ${{ github.repository }}@$SHORT_SHA
            Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

            Original message:
            $ORIGINAL_COMMIT_MSG
            EOF
            )
            
            git commit -m "$COMMIT_MSG"
            git push
          else
            echo "No changes detected."
          fi